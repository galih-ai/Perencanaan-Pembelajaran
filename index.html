<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perencanaan Pembelajaran</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f4f4f9;
    }

    #landing-page {
      display: flex;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    button {
      background: #4285f4;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px);
      filter: brightness(.92);
    }

    iframe {
      display: none;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="landing-page">
    <h2>Selamat Datang</h2>
    <p>di Perencanaan Pembelajaran</p>
    <button type="button" onclick="bukaAplikasi()">Buka Aplikasi</button>
  </div>

  <iframe id="app-frame" title="Perencanaan Pembelajaran"></iframe>

  <script>
    const APP_URL = 'https://script.google.com/macros/s/AKfycbxcq-bGFoAM9xdifJZ7rYvxouUkDr2r-5MvSo3E6MRmzoXVw4w21yTVHY6bJYL46BvR/exec';

    function bukaAplikasi() {
      const token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        alert('Akses aplikasi harus dibuka melalui landing page.');
        return;
      }

      const landing = document.getElementById('landing-page');
      const iframe = document.getElementById('app-frame');

      iframe.src = APP_URL + '?token=' + encodeURIComponent(token);
      landing.style.display = 'none';
      iframe.style.display = 'block';
    }
  </script>
</body>
</html>
